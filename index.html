  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      width: 100%;
    }

    body {
      background-color: #0a0a0a;
      color: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .glow {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 200px;
      background: radial-gradient(ellipse 80% 100% at 50% -20%, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
      pointer-events: none;
    }

    .edge {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.06) 30%, rgba(255, 255, 255, 0.08) 50%, rgba(255, 255, 255, 0.06) 70%, transparent 100%);
      pointer-events: none;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 1;
      padding: 0 20px;
    }

    .icon {
      width: 56px;
      height: 56px;
      margin-bottom: 24px;
    }

    .icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: brightness(0) saturate(100%) invert(40%) sepia(80%) saturate(3000%) hue-rotate(252deg) brightness(105%) contrast(97%);
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 16px;
      letter-spacing: -0.01em;
      color: #ffffff;
    }

    .sub {
      font-size: 14px;
      font-weight: 400;
      color: #888888;
      line-height: 1.5;
      margin-bottom: 4px;
    }

    .sub a {
      color: #888888;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .sub a:hover {
      color: #aaaaaa;
    }

    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      border: none;
      line-height: 1;
    }

    .dark {
      background-color: #1a1a1a;
      color: #ffffff;
      border: 1px solid #2a2a2a;
    }

    .dark:hover {
      background-color: #222222;
      border-color: #333333;
    }

    .accent {
      background-color: #a855f7;
      color: #ffffff;
    }

    .accent:hover {
      background-color: #9333ea;
    }

    .btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
